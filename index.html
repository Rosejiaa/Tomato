<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A cute Pomodoro timer.">
    <title>Tomato - 可爱番茄钟</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
</head>

<body data-mode="pomodoro">
    <div class="container">
        <div class="tomato-card">
            <nav class="modes">
                <button class="mode-btn active" data-mode="pomodoro">专注</button>
                <button class="mode-btn" data-mode="shortBreak">短休</button>
                <button class="mode-btn" data-mode="longBreak">长休</button>
            </nav>

            <div class="tomato-character">
                <svg viewBox="0 0 200 200" width="160" height="160" xmlns="http://www.w3.org/2000/svg">
                    <!-- Leaves -->
                    <path d="M100 45 C70 30, 40 45, 60 70 C70 80, 85 70, 100 45 Z" fill="#7cb342" />
                    <path d="M100 45 C130 30, 160 45, 140 70 C130 80, 115 70, 100 45 Z" fill="#8bc34a" />
                    <!-- Stem -->
                    <path d="M100 45 C95 25, 105 15, 110 5 C115 15, 105 25, 100 45 Z" fill="#558b2f" />
                    <!-- Tomato Body -->
                    <circle cx="100" cy="115" r="75" fill="var(--primary-color, #ff6b6b)"
                        style="transition: fill 0.4s ease;" />
                    <!-- Highlight -->
                    <path d="M45 90 Q 60 55 100 50" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="8"
                        stroke-linecap="round" />
                    <!-- Face -->
                    <g class="face">
                        <!-- Eyes -->
                        <circle class="eye" cx="75" cy="110" r="8" fill="#4a0404" />
                        <circle class="eye" cx="125" cy="110" r="8" fill="#4a0404" />
                        <!-- Blush -->
                        <circle class="blush" cx="55" cy="120" r="10" fill="rgba(255, 160, 175, 0.6)" />
                        <circle class="blush" cx="145" cy="120" r="10" fill="rgba(255, 160, 175, 0.6)" />
                        <!-- Mouth Idle -->
                        <path class="mouth-idle" d="M 85 125 Q 100 145 115 125" fill="none" stroke="#4a0404"
                            stroke-width="5" stroke-linecap="round" />
                        <!-- Mouth Running -->
                        <path class="mouth-running" d="M 90 130 Q 100 120 110 130" fill="none" stroke="#4a0404"
                            stroke-width="5" stroke-linecap="round" style="display: none;" />
                    </g>
                </svg>
            </div>

            <div class="timer-display">
                <span id="minutes">25</span><span class="colon">:</span><span id="seconds">00</span>
            </div>

            <div class="controls">
                <button id="start-btn" class="main-btn">开始</button>
                <button id="reset-btn" class="icon-btn" aria-label="Reset">
                    <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2.5" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
