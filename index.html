<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple, modern Pomodoro timer for maximum productivity.">
    <title>Tomato - 极简番茄钟</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="glass-panel">
            <nav class="modes">
                <button class="mode-btn active" data-mode="pomodoro">专注</button>
                <button class="mode-btn" data-mode="shortBreak">短休</button>
                <button class="mode-btn" data-mode="longBreak">长休</button>
            </nav>
            <div class="timer-display">
                <span id="minutes">25</span><span class="colon">:</span><span id="seconds">00</span>
            </div>
            <div class="controls">
                <button id="start-btn" class="main-btn">开始</button>
                <button id="reset-btn" class="icon-btn" aria-label="Reset">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                </button>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
